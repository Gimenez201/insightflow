<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>InsightFlow</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      width: 320px;
      margin: auto;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      width: 80%;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .history {
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }

    .item {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <h1>🚀 InsightFlow</h1>

  <div class="card">
    <p>Digite algo para análise:</p>
    <input id="input" type="text">
    <br><br>

    <button onclick="analisar()">Analisar</button>
    <button onclick="exportarPDF()">📄 Exportar PDF</button>

    <p id="resultado"></p>
  </div>

  <div class="card">
    <h3>📜 Histórico (Firebase)</h3>
    <div class="history" id="historico"></div>
  </div>
