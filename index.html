<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>InsightFlow</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      width: 320px;
      margin: auto;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      width: 80%;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .history {
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }

    .item {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <h1>🚀 InsightFlow</h1>

  <div class="card">
    <p>Digite algo para análise:</p>
    <input id="input" type="text">
    <br><br>

    <button onclick="analisar()">Analisar</button>
    <button onclick="favoritar()">⭐ Favoritar</button>

    <p id="resultado"></p>
  </div>

  <div class="card">
    <h3>📜 Histórico</h3>
    <div class="history" id="historico"></div>
  </div>

  <script>
    let historico = [];

    function analisar() {
      let valor = document.getElementById("input").value.toLowerCase();
      let resultado = document.getElementById("resultado");

      if (valor === "") {
        resultado.innerText = "Digite algo!";
        return;
      }

      let resposta = "";

      if (valor.includes("erro") || valor.includes("problema")) {
        resposta = "⚠️ Detectamos um possível problema.";
      } 
      else if (valor.includes("sucesso") || valor.includes("bom")) {
        resposta = "✅ Resultado positivo!";
      } 
      else if (valor.length < 5) {
        resposta = "ℹ️ Informação muito curta.";
      } 
      else {
        resposta = "📊 Dados dentro do padrão esperado.";
      }

      resultado.innerText = resposta;

      // salvar no histórico
      historico.push({ texto: valor, resposta: resposta, favorito: false });
      atualizarHistorico();
    }

    function atualizarHistorico() {
      let div = document.getElementById("historico");
      div.innerHTML = "";

      historico.forEach((item, index) => {
        let el = document.createElement("div");
        el.className = "item";

        el.innerHTML = `
          <strong>${item.texto}</strong><br>
          ${item.resposta}<br>
          <button onclick="toggleFavorito(${index})">
            ${item.favorito ? "💛 Favorito" : "⭐ Favoritar"}
          </button>
        `;

        div.appendChild(el);
      });
    }

    function toggleFavorito(index) {
      historico[index].favorito = !historico[index].favorito;
      atualizarHistorico();
    }

    function favoritar() {
      let ultimo = historico[historico.length - 1];
      if (ultimo) {
        ultimo.favorito = true;
        atualizarHistorico();
      }
    }
  </script>

</body>
</html>
