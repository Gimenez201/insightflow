<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>InsightFlow</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      width: 320px;
      margin: auto;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 10px;
      border: none;
      width: 80%;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .history {
      text-align: left;
      max-height: 200px;
      overflow-y: auto;
    }

    .item {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

  <h1>🚀 InsightFlow</h1>

  <div class="card">
    <p>Digite algo para análise:</p>
    <input id="input" type="text">
    <br><br>

    <button onclick="analisar()">Analisar</button>
    <button onclick="exportarPDF()">📄 Exportar PDF</button>

    <p id="resultado"></p>
  </div>

  <div class="card">
    <h3>📜 Histórico (Firebase)</h3>
    <div class="history" id="historico"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDXDB_44iSlqh2bHhuEGzZlEirgvlbyCcw",
      authDomain: "insightflow-7a5a0.firebaseapp.com",
      projectId: "insightflow-7a5a0",
      storageBucket: "insightflow-7a5a0.firebasestorage.app",
      messagingSenderId: "562764608972",
      appId: "1:562764608972:web:3f796c4d748a37de2dd969"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function analisar() {
      let valor = document.getElementById("input").value.toLowerCase();
      let resultado = document.getElementById("resultado");

      if (valor === "") {
        resultado.innerText = "Digite algo!";
        return;
      }

      let resposta = "";

      if (valor.includes("erro") || valor.includes("problema")) {
        resposta = "⚠️ Problema detectado.";
      } 
      else if (valor.includes("sucesso") || valor.includes("bom")) {
        resposta = "✅ Resultado positivo!";
      } 
      else if (valor.length < 5) {
        resposta = "ℹ️ Texto muito curto.";
      } 
      else {
        resposta = "📊 Dentro do padrão.";
      }

      resultado.innerText = resposta;

      db.collection("analises").add({
        texto: valor,
        resposta: resposta,
        data: new Date()
      });

      carregarHistorico();
    }

    function carregarHistorico() {
      let div = document.getElementById("historico");
      div.innerHTML = "";

      db.collection("analises")
        .orderBy("data", "desc")
        .limit(5)
        .get()
        .then((querySnapshot) => {
          querySnapshot.forEach((doc) => {
            let item = doc.data();

            let el = document.createElement("div");
            el.className = "item";
            el.innerHTML = `<strong>${item.texto}</strong><br>${item.resposta}`;

            div.appendChild(el);
          });
        });
    }

    function exportarPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.text("Relatório - InsightFlow", 10, 10);

      let y = 20;

      db.collection("analises")
        .orderBy("data", "desc")
        .limit(5)
        .get()
        .then((querySnapshot) => {
          querySnapshot.forEach((docItem) => {
            let item = docItem.data();

            doc.text("Texto: " + item.texto, 10, y);
            y += 10;
            doc.text("Resultado: " + item.resposta, 10, y);
            y += 15;
          });

          doc.save("relatorio.pdf");
        });
    }

    carregarHistorico();
  </script>

</body>
</html>
